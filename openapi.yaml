openapi: 3.0.3
info:
  title: Asynchronous Scanner API
  description: API for submitting URLs for background scanning and polling for their completion status.
  version: 1.0.0
servers:
  - url: http://localhost:3000
    description: Local development server

paths:
  /api/scan:
    post:
      summary: Initiate a new background scan
      description: Submits a URL to be scanned. The job is placed in a queue and processed asynchronously by a background worker.
      operationId: startScan
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ScanRequest"
      responses:
        "202":
          description: Scan job accepted and queued successfully.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ScanInitResponse"
        "400":
          description: Invalid request payload (e.g., malformed URL).
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/scan/{jobId}:
    get:
      summary: Get the status and result of a scan
      description: Poll this endpoint to get the real-time status of a scan job. Once the status is `completed`, the `data` object will contain the final report.
      operationId: getScan
      parameters:
        - name: jobId
          in: path
          required: true
          description: The unique identifier of the background job.
          schema:
            type: string
      responses:
        "200":
          description: Current status of the job. Returns HTTP 200 regardless of whether the job is pending or finished.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ScanStatusResponse"
        "404":
          description: Job ID does not exist or the job has expired from both the queue and persistent storage.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Internal server error.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

components:
  schemas:
    ScanRequest:
      type: object
      required:
        - url
      properties:
        url:
          type: string
          format: uri
          description: The target URL to be scanned. Must be a secure (HTTPS) URL.
          example: "https://example.com"

    ScanInitResponse:
      type: object
      properties:
        message:
          type: string
          example: "Scan initiated successfully"
        jobId:
          type: string
          description: The unique identifier generated by the queue provider.
          example: "job_987654321"

    ScanStatusResponse:
      type: object
      properties:
        jobId:
          type: string
          description: The unique identifier of the background job.
          example: "job_987654321"
        status:
          type: string
          description: The current lifecycle state of the job. Matches BullMQ states natively.
          enum:
            - waiting
            - active
            - completed
            - failed
            - delayed
          example: "active"
        progress:
          type: integer
          description: The completion percentage of the job (0 to 100).
          example: 45
        data:
          type: object
          nullable: true
          description: The final report JSON. Populated only when status is `completed`.
          additionalProperties: true
          example: null
        error:
          type: string
          nullable: true
          description: The failure reason. Populated only when status is `failed`.
          example: null

    ErrorResponse:
      type: object
      properties:
        error:
          type: string
          description: Human-readable error message.
          example: "Invalid Job ID or job expired."
